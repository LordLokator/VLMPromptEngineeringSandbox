<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>VLM Streaming App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row h-100">
            <!-- LEFT PANEL -->
            <div class="col-md-8 d-flex flex-column gap-3">
                <div>
                    <img id="video" src="/video_feed" />
                </div>
                <!-- Preset Button Panel -->
                <div id="presetBar" class="d-flex flex-wrap gap-2 mb-2">
                    <!-- Buttons will be added here dynamically -->
                </div>

                <div id="inputPanel" class="align-items-center">
                    <!-- Preset Buttons and Save -->
                    <div id="presetBar" class="d-flex flex-wrap gap-2 mb-2"></div>
                    <div class="mb-2">
                        <button id="savePresetBtn" class="btn btn-outline-success btn-sm" disabled>
                            💾 Save as Preset
                        </button>
                    </div>
                    <input id="msgInput" type="text" class="form-control" placeholder="New prompt..." />
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    <button id="toggleStream" class="btn btn-outline-secondary" onclick="toggleStream()">
                        Toggle Stream
                    </button>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="col-md-4 chat-wrapper">
                <div id="chat" class="scrollable-chat shadow-sm"></div>
            </div>
        </div>
    </div>
    <script src="/src/script.js"></script>

</body>

</html>
