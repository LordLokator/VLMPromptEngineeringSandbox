<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>VLM Streaming App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        #video {
            width: 100%;
            border-radius: 10px;
        }

        #chat {
            height: 100%;
            overflow-y: auto;
            padding: 10px;
            background-color: #fff;
            border-radius: 10px;
            user-select: none;
        }

        .chat-message {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        #inputPanel {
            display: flex;
            gap: 10px;
        }

        #msgInput {
            flex: 1;
            border-radius: 10px;
        }

        #toggleStream {
            border-radius: 10px;
        }

        .container-fluid {
            height: 100vh;
            padding: 15px;
        }

        .scrollable-chat {
            max-height: 100%;
            overflow-y: auto;
        }

        .chat-wrapper {
            height: 90vh;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row h-100">
            <!-- LEFT PANEL -->
            <div class="col-md-8 d-flex flex-column gap-3">
                <div>
                    <img id="video" src="/video_feed" />
                </div>
                <!-- Preset Button Panel -->
                <div id="presetBar" class="d-flex flex-wrap gap-2 mb-2">
                    <!-- Buttons will be added here dynamically -->
                </div>

                <div id="inputPanel" class="align-items-center">
                    <!-- Preset Buttons and Save -->
                    <div id="presetBar" class="d-flex flex-wrap gap-2 mb-2"></div>
                    <div class="mb-2">
                        <button id="savePresetBtn" class="btn btn-outline-success btn-sm" disabled>💾 Save as
                            Preset</button>
                    </div>
                    <input id="msgInput" type="text" class="form-control" placeholder="New prompt..." />
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    <button id="toggleStream" class="btn btn-outline-secondary" onclick="toggleStream()">Toggle
                        Stream</button>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="col-md-4 chat-wrapper">
                <div id="chat" class="scrollable-chat shadow-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${location.host}/ws`);
        const chat = document.getElementById("chat");
        const msgInput = document.getElementById("msgInput");
        const MAX_MESSAGES = 100;

        const presetBar = document.getElementById("presetBar");
        const saveBtn = document.getElementById("savePresetBtn");

        const pastelColors = ["#FF6633", "#FFB399", "#FF33FF", "#FFFF99", "#00B3E6", "#E6B333", "#3366E6", "#999966", "#809980", "#E6FF80", "#1AFF33", "#999933", "#FF3380", "#CCCC00", "#66E64D", "#4D80CC", "#FF4D4D", "#99E6E6", "#6666FF"
        ];

        ws.onmessage = (event) => {
            addChatMessage("Server", event.data);
        };

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            ws.send(text);
            addChatMessage("You", text);
            msgInput.value = "";
            updateSaveButtonState();
        }

        function toggleStream() {
            ws.send("toggle_stream");
            addChatMessage("System", "Stream toggle requested");

            const img = document.getElementById("video");
            img.src = `/video_feed?ts=${Date.now()}`;
        }

        function addChatMessage(sender, msg) {
            const line = document.createElement("div");
            line.className = "chat-message text-muted";
            line.innerHTML = `<strong>${sender}:</strong> ${msg}`;
            chat.appendChild(line);
            chat.scrollTop = chat.scrollHeight;

            if (chat.children.length > MAX_MESSAGES) {
                chat.removeChild(chat.firstChild);
            }
        }

        function getRandomColor() {
            const hexColors = [
                "#f05d5eff",
                "#0f7173ff",
                "#272932ff",
                "#d8a47fff",
                "#60495A",
                "#3F7D20",
            ];

            return hexColors[Math.floor(Math.random() * hexColors.length)];
        }

        async function loadPresetButtons() {
            const resp = await fetch("/src/button_presets.json");
            const presets = await resp.json();

            presets.forEach(preset => {
                const btn = document.createElement("button");
                btn.className = `btn btn-sm rounded-pill text-white`;
                btn.style.backgroundColor = getRandomColor();
                btn.textContent = preset.label;
                btn.title = preset.text;
                btn.onclick = () => {
                    msgInput.value = preset.text;
                    msgInput.focus();
                    updateSaveButtonState();
                };
                presetBar.appendChild(btn);
            });
        }

        function updateSaveButtonState() {
            saveBtn.disabled = msgInput.value.trim().length === 0;
        }

        msgInput.addEventListener("input", updateSaveButtonState);

        saveBtn.onclick = () => {
            const text = msgInput.value.trim();
            if (!text) return;

            const label = prompt("Enter a name for this preset (max 25 characters):");
            if (!label || label.trim().length === 0) return;

            const cleanLabel = label.trim().slice(0, 25);
            msgInput.value = "";
            updateSaveButtonState();

            const btn = document.createElement("button");
            btn.className = `btn btn-sm rounded-pill text-white ${getRandomColorClass()}`;
            btn.textContent = cleanLabel;
            btn.title = text;
            btn.onclick = () => {
                msgInput.value = text;
                msgInput.focus();
                updateSaveButtonState();
            };
            presetBar.appendChild(btn);
        };

        window.onload = () => {
            loadPresetButtons();
            updateSaveButtonState();
        };
    </script>

</body>

</html>
