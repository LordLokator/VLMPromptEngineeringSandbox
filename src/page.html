<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>VLM Streaming App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        #video {
            width: 100%;
            border-radius: 10px;
        }

        #chat {
            height: 100%;
            overflow-y: auto;
            padding: 10px;
            background-color: #fff;
            border-radius: 10px;
            user-select: none;
        }

        .chat-message {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        #inputPanel {
            display: flex;
            gap: 10px;
        }

        #msgInput {
            flex: 1;
            border-radius: 10px;
        }

        #toggleStream {
            border-radius: 10px;
        }

        .container-fluid {
            height: 100vh;
            padding: 15px;
        }

        .scrollable-chat {
            max-height: 100%;
            overflow-y: auto;
        }

        .chat-wrapper {
            height: 90vh;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row h-100">
            <!-- LEFT PANEL -->
            <div class="col-md-8 d-flex flex-column gap-3">
                <div>
                    <img id="video" src="/video_feed" />
                </div>
                <div id="inputPanel" class="align-items-center">
                    <input id="msgInput" type="text" class="form-control" placeholder="Type a message..." />
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                    <button id="toggleStream" class="btn btn-outline-secondary" onclick="toggleStream()">Toggle
                        Stream</button>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="col-md-4 chat-wrapper">
                <div id="chat" class="scrollable-chat shadow-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${location.host}/ws`);
        const chat = document.getElementById("chat");
        const msgInput = document.getElementById("msgInput");
        const MAX_MESSAGES = 100;

        ws.onmessage = (event) => {
            addChatMessage("Server", event.data);
        };

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            ws.send(text);
            addChatMessage("You", text);
            msgInput.value = "";
        }

        function toggleStream() {
            ws.send("toggle_stream");
            addChatMessage("System", "Stream toggle requested");
            // Force video reload
            const img = document.getElementById("video");
            const now = Date.now();
            img.src = `/video_feed?ts=${now}`; // cache buster
        }

        function addChatMessage(sender, msg) {
            const line = document.createElement("div");
            line.className = "chat-message text-muted";
            line.innerHTML = `<strong>${sender}:</strong> ${msg}`;
            chat.appendChild(line);

            // Scroll to bottom
            chat.scrollTop = chat.scrollHeight;

            // Trim old messages
            if (chat.children.length > MAX_MESSAGES) {
                chat.removeChild(chat.firstChild);
            }
        }
    </script>
</body>

</html>
