<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>VLM Streaming App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row h-100">
            <!-- LEFT PANEL -->
            <div class="col-md-8 d-flex flex-column gap-3">
                <div>
                    <img id="video" src="/video_feed" />
                </div>

                <!-- Preset Buttons -->
                <div id="presetBar" class="d-flex flex-wrap gap-2 mb-2"></div>

                <!-- Input Panel -->
                <div id="inputPanel" class="d-flex flex-column gap-2">
                    <div>
                        <label for="tempSlider" class="form-label">Temperature: <span id="tempVal">0.01</span></label>
                        <input type="range" class="form-range" min="0" max="1" step="0.01" id="tempSlider"
                            value="0.01" />
                    </div>

                    <textarea id="msgInput" class="form-control" rows="3" placeholder="Enter your prompt..."></textarea>

                    <div class="d-flex flex-wrap gap-2">
                        <button id="savePresetBtn" class="btn btn-outline-success" disabled>
                            💾 Save as Preset
                        </button>
                        <button id="toggleStream" class="btn btn-outline-secondary" onclick="toggleStream()">
                            Toggle Stream
                        </button>
                        <button class="btn btn-primary" onclick="sendMessage()">
                            Send
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="col-md-4 chat-wrapper">
                <div id="chat" class="scrollable-chat shadow-sm"></div>
            </div>
        </div>
    </div>
    <script src="/src/script.js"></script>
</body>


</html>
